<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proizvođači Jaja – LokalniPlodovi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="mobile.css">

  <style>
    .container {
      max-width: 1400px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      flex: 1;
    }

    h1 {
      color: #5d4037;
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 2.5rem;
    }

    #proizvodi-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .proizvod-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }

    .proizvod-card:hover {
      transform: translateY(-5px);
    }

    .proizvod-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <nav>
    <div class="logo">LokalniPlodovi</div>
    <button class="hamburger" onclick="this.classList.toggle('active'); document.querySelector('nav ul').classList.toggle('open');">
      <span></span><span></span><span></span>
    </button>
    <ul>
      <li><a href="index.html">Početna</a></li>
      <li><a href="Prodavci.html">Svi prodavci</a></li>
      <li><a href="mapa.html">Mapa</a></li>
      <li><a href="chat.html">Chat</a></li>

      <li id="moj-profil-li" style="display:none;">
        <a href="moj-profil.html" id="moj-profil-link">Moj profil</a>
      </li>
      <li id="odjavi-se-li" style="display:none;">
        <a href="#" onclick="odjaviSe()">Odjavi se</a>
      </li>

      <li id="prijavi-se-li"><a href="login.html">Prijavi se</a></li>
      <li id="postani-prodavac-li"><a href="registracija.html">Postani prodavac</a></li>
    </ul>
  </nav>
</header>

<div class="container">
  <h1>Proizvođači Jaja</h1>
  <div id="proizvodi-container"></div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container">
    <h2>LokalniPlodovi</h2>
    <p>Prirodno • Sezonski • Direktno sa imanja Srbije</p>
    <p style="margin-top:2rem; opacity:0.9;">© 2026 LokalniPlodovi • Sva prava zadržana</p>
    <p style="margin-top:0.5rem;">
      <a href="politika-privatnosti.html">Politika privatnosti</a> • 
      <a href="uslovi-koriscenja.html">Uslovi korišćenja</a>
    </p>
  </div>
</footer>

<script>
  const backendUrl = 'https://lokalni-backend-production.up.railway.app';

  document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    const tip = localStorage.getItem('tip');

    if (token) {
      document.getElementById('moj-profil-li').style.display = 'list-item';
      document.getElementById('odjavi-se-li').style.display = 'list-item';
      document.getElementById('prijavi-se-li').style.display = 'none';
      document.getElementById('postani-prodavac-li').style.display = 'none';

      const link = document.getElementById('moj-profil-link');
      if (link) {
        link.href = (tip === 'kupac') ? 'kupac-profil.html' : 'moj-profil.html';
      }
    }

    ucitajProizvode();
  });

  async function ucitajProizvode() {
    const container = document.getElementById('proizvodi-container');
    container.innerHTML = '<p style="text-align:center; padding:6rem 0; color:#666;">Učitavam proizvode...</p>';

    try {
      const response = await fetch(`${backendUrl}/proizvodi?glavnaNisa=Jaja`);
      const proizvodi = await response.json();

      container.innerHTML = '';

      if (proizvodi.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p><strong>Trenutno nema dostupnih jaja.</strong></p>
            <p>Budite prvi koji će dodati jaja na pijacu!</p>
          </div>`;
        return;
      }

      proizvodi.forEach(p => {
        const card = document.createElement('div');
        card.className = 'proizvod-card';
        card.innerHTML = `
          ${p.slika ? `<img src="${p.slika}" alt="${p.naziv}">` : ''}
          <h3>${p.naziv}</h3>
          <p><strong>Cena:</strong> ${p.cena} RSD
