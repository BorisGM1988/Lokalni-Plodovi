<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />

  <title>Proizvođači Krastavac – LokalniPlodovi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --zelena: #2e7d32;
      --zelena-svetla: #4caf50;
      --zemlja: #5d4037;
      --siva: #757575;
      --svetlo: #f8f9f5;
      --belo: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--svetlo);
      color: #333;
      line-height: 1.6;
      min-height: 100vh;

    header {
      background: rgba(46, 125, 50, 0.94);
      color: white;

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;

      margin: 0 auto;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 2.5rem;
      margin: 0;
      padding: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }

    nav a:hover { color: #c8e6c9; }

    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      color: var(--zemlja);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    footer {
      background: var(--zemlja);
      color: white;
      text-align: center;
      padding: 4rem 1rem 2.5rem;
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <div class="logo">LokalniPlodovi</div>
    <ul>
      <li><a href="../index.html">Početna</a></li>

<!-- === GLAVNI SCRIPT ZA PROIZVODE + DUGMAD === -->
<script>
  const backendUrl = 'https://lokalni-backend-production.up.railway.app';

  async function ucitajProizvode() {
    const container = document.getElementById('proizvodi-container');
    container.innerHTML = '<p style="text-align:center; padding:3rem 0; color:#666;">Učitavam proizvode...</p>';

    try {
      const response = await fetch(`${backendUrl}/proizvodi?glavnaNisa=Povrće&podnisa=Krastavac`);
      const proizvodi = await response.json();

      const token = localStorage.getItem('token');
      let currentUserId = null;

      if (token) {
        try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          currentUserId = payload.userId;
        } catch(e) {}
      }

      container.innerHTML = '';

      // Sakrij "Ova stranica je za sada prazna"
      document.querySelectorAll('p').forEach(p => {
        if (p.textContent.includes('Ova stranica je za sada prazna')) {
          p.style.display = 'none';
        }
      });

      if (proizvodi.length === 0) {
        container.innerHTML = `
          <p style="text-align:center; color:#666; font-size:1.1rem; padding:4rem 0;">
            Još nema proizvoda u ovoj podniši.<br>
            <strong>Budite prvi koji će dodati krastavac!</strong>
          </p>`;
        return;
      }

      proizvodi.forEach(p => {
        const isOwner = currentUserId && String(p.userId) === String(currentUserId);

        const card = document.createElement('div');
        card.style = `
          background: white; 
          border: 1px solid #e0e0e0; 
          border-radius: 16px; 
          padding: 1.8rem; 
          margin-bottom: 1.5rem;
          box-shadow: 0 4px 15px rgba(0,0,0,0.06);
          position: relative;
        `;

        card.innerHTML = `
          <h3 style="margin:0 0 0.8rem 0; color:#2e7d32;">${p.naziv}</h3>
          <p style="margin:0.5rem 0; font-size:1.05rem;"><strong>Cena:</strong> ${p.cena} RSD</
