<script>
  const backendUrl = 'https://lokalni-backend-production.up.railway.app';

  // 1. UČITAVANJE PROFILA - SA PODRŠKOM ZA TUĐI PROFIL (ovo smo ceo veče radili)
  async function ucitajProfil() {
    const urlParams = new URLSearchParams(window.location.search);
    const userIdParam = urlParams.get('userId');
    const token = localStorage.getItem('token');

    let url = `${backendUrl}/profile`;
    if (userIdParam) {
      url += `?userId=${userIdParam}`;
    }

    try {
      const headers = {};
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }

      const response = await fetch(url, {
        method: 'GET',
        headers: headers
      });

      if (!response.ok) throw new Error(`Greška: ${response.status}`);

      const data = await response.json();

      document.getElementById('profileName').textContent = data.ime || 'Korisnik';
      document.getElementById('profileBio').textContent = data.opis || 'Nema opisa';
      document.getElementById('email').textContent = data.email || 'N/A';
      document.getElementById('telefon').textContent = data.telefon || 'Nije navedeno';
      document.getElementById('lokacija').textContent = data.lokacija || 'Nije navedeno';
      document.getElementById('opis').textContent = data.opis || 'Nema opisa';
      document.getElementById('registeredAt').textContent = data.registeredAt ? new Date(data.registeredAt).toLocaleString('sr-RS') : 'N/A';

      const niseDiv = document.getElementById('nise');
      niseDiv.innerHTML = '';
      if (data.nise && data.nise.length > 0) {
        data.nise.forEach(nisa => {
          const badge = document.createElement('span');
          badge.className = 'nise-badge';
          badge.textContent = nisa;
          niseDiv.appendChild(badge);
        });
      } else {
        niseDiv.textContent = 'Nijedna';
      }

      if (data.slika) document.getElementById('profile-avatar').src = data.slika;
      if (data.coverSlika) {
        document.getElementById('cover-image').src = data.coverSlika;
        document.getElementById('cover-image').style.display = 'block';
        document.getElementById('placeholder-text').style.display = 'none';
      }
    } catch (err) {
      console.error('Greška pri učitavanju profila:', err);
      document.getElementById('profileName').textContent = 'Greška pri učitavanju profila';
    }
  }

  // 2. NAVIGACIJA
  function initNav() {
    const token = localStorage.getItem('token');
    if (token) {
      document.getElementById('moj-profil-li').style.display = 'list-item';
      document.getElementById('odjavi-se-li').style.display = 'list-item';
      document.getElementById('prijavi-se-li').style.display = 'none';
      document.getElementById('postani-prodavac-li').style.display = 'none';
    } else {
      document.getElementById('moj-profil-li').style.display = 'none';
      document.getElementById('odjavi-se-li').style.display = 'none';
      document.getElementById('prijavi-se-li').style.display = 'list-item';
      document.getElementById('postani-prodavac-li').style.display = 'list-item';
    }
  }

  function odjaviSe() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  }

  // 3. OBJAVI NOVOST
  function objaviNovost() {
    const tekst = prompt('Šta želite da objavite?\n\n(Npr: "Danas imamo sveže maline i med po akcijskoj ceni!")');
    if (!tekst || tekst.trim() === '') return;

    const token = localStorage.getItem('token');
    if (!token) return alert('Morate biti ulogovani');

    fetch(`${backendUrl}/objavi-novost`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ tekst: tekst.trim() })
    })
    .then(() => alert('Objava uspešno dodata!'))
    .catch(() => alert('Greška pri objavljivanju'));
  }

  // 4. DODAJ PROIZVOD
  function dodajProizvod() {
    document.getElementById('dodaj-proizvod-modal').style.display = 'flex';
  }

  function zatvoriModal() {
    document.getElementById('dodaj-proizvod-modal').style.display = 'none';
  }

  async function izloziNaPijac() {
    const naziv = document.getElementById('naziv').value.trim();
    const cena = parseFloat(document.getElementById('cena').value);
    const kolicina = parseInt(document.getElementById('kolicina').value);
    const glavnaNisa = document.getElementById('glavna-nisa').value;
    const podnisa = document.getElementById('podnisa').value.trim();

    if (!naziv || !cena || !kolicina || !glavnaNisa) {
      alert('Molimo popunite sva obavezna polja');
      return;
    }

    const token = localStorage.getItem('token');
    if (!token) {
      alert('Morate biti ulogovani!');
      return;
    }

    const podaci = {
      naziv: naziv,
      cena: cena,
      kolicina: kolicina,
      glavnaNisa: glavnaNisa,
      podnisa: podnisa || null
    };

    try {
      const response = await fetch(`${backendUrl}/dodaj-proizvod`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(podaci)
      });

      const result = await response.json();

      if (response.ok) {
        alert('✅ Proizvod je uspešno izložen na pijac!');
        zatvoriModal();
      } else {
        alert('❌ Greška: ' + (result.error || 'Nešto nije u redu'));
      }
    } catch (err) {
      console.error(err);
      alert('Došlo je do greške pri komunikaciji sa serverom.');
    }
  }

  // 5. IZMENI PROFIL
  function izmeniProfil() {
    document.getElementById('izmeni-profil-modal').style.display = 'flex';
  }

  function zatvoriIzmeniModal() {
    document.getElementById('izmeni-profil-modal').style.display = 'none';
  }

  async function sacuvajIzmene() {
    alert("Funkcija čuvanja izmena će biti povezana kasnije.");
    zatvoriIzmeniModal();
  }

  // Pokretanje svega
  document.addEventListener('DOMContentLoaded', () => {
    initNav();
    ucitajProfil();

    // Preview za sliku proizvoda
    const slikaInput = document.getElementById('slika-proizvoda');
    if (slikaInput) {
      slikaInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(ev) {
            document.getElementById('preview-slika').src = ev.target.result;
            document.getElementById('preview-slika').style.display = 'block';
          };
          reader.readAsDataURL(file);
        }
      });
    }
  });
</script>
